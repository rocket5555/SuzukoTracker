<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuzukoTracker</title>

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --primary: #4F46E5; --primary-hover: #4338CA;
            --bg-color: #F3F4F6; --card-bg: #FFFFFF; --card-border: #E5E7EB;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --text: #0f172a; --text-light: #475569;
            --border: #E5E7EB; --border-light: #F9FAFB;
            --error: #ef4444; --error-bg: #FEF2F2;
            --success: #10b981; --warning: #f59e0b;
            --input-bg: #F9FAFB; --input-focus: #FFFFFF;
            --highlight: rgba(79, 70, 229, 0.05);
        }

        [data-theme="dark"] {
            --primary: #818CF8; --primary-hover: #6366F1;
            --bg-color: #080808; 
            --card-bg: #111111; --card-border: #222222;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5); 
            --text: #f1f5f9; --text-light: #94a3b8;
            --border: #2A2A2A; --border-light: #1A1A1A;
            --error: #f87171; --error-bg: rgba(248, 113, 113, 0.1);
            --success: #34d399; --warning: #fbbf24;
            --input-bg: #1A1A1A; --input-focus: #262626;
            --highlight: rgba(129, 140, 248, 0.15);
        }

        * { box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, sans-serif; background-color: var(--bg-color); color: var(--text); line-height: 1.5; padding: 2rem 1rem; max-width: 1100px; margin: 0 auto; transition: background-color 0.2s ease, color 0.2s ease; }

        .card { background: var(--card-bg); border: 1px solid var(--card-border); box-shadow: var(--shadow); padding: 1.5rem; border-radius: 12px; margin-bottom: 1.5rem; transition: background-color 0.2s ease, border-color 0.2s ease; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
        h1, h2, h3 { margin: 0; color: var(--text); font-weight: 700; }
        h1 { font-size: 2rem; letter-spacing: -0.02em; }
        h2 { font-size: 1.25rem; margin-bottom: 1.25rem; border-bottom: 1px solid var(--border); padding-bottom: 0.75rem; }

        .user-nav { display: flex; align-items: center; gap: 1rem; background: var(--input-bg); padding: 0.5rem 1rem; border-radius: 99px; border: 1px solid var(--border); }
        .user-nav span { font-size: 0.85rem; font-weight: 600; color: var(--text-light); }

        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
        .stat-card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 12px; padding: 1.25rem; box-shadow: var(--shadow); }
        .stat-title { font-size: 0.8rem; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; margin-bottom: 0.5rem; }
        .stat-value { font-size: 1.75rem; font-weight: 700; margin-bottom: 0.25rem; }
        .stat-sub { font-size: 0.875rem; color: var(--text-light); }

        .progress-container { margin-bottom: 1rem; background: var(--input-bg); padding: 1rem; border-radius: 12px; border: 1px solid var(--border); }
        .progress-header { display: flex; justify-content: space-between; font-size: 0.875rem; margin-bottom: 0.5rem; font-weight: 500;}
        .progress-track { height: 10px; background: var(--border-light); border-radius: 99px; overflow: hidden; }
        .progress-fill { height: 100%; transition: width 0.3s ease, background-color 0.3s ease; }

        .advice-box { background: var(--highlight); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; margin-bottom: 1.5rem; }
        .advice-title { font-weight: 700; font-size: 0.95rem; margin-bottom: 0.5rem; color: var(--primary); display: flex; align-items: center; gap: 0.5rem; }
        .advice-text { font-size: 0.95rem; margin-bottom: 0.5rem; }
        
        .opt-grid { display: flex; gap: 0.5rem; overflow-x: auto; padding-bottom: 0.5rem; margin-top: 1rem; }
        .opt-card { flex: 1; min-width: 90px; background: var(--input-bg); border: 1px solid var(--border); border-radius: 8px; padding: 0.75rem 0.5rem; text-align: center; display: flex; flex-direction: column; gap: 0.25rem; transition: transform 0.2s, border-color 0.2s; cursor: default; }
        .opt-card:hover { transform: translateY(-2px); border-color: var(--primary); }
        .opt-day { font-size: 0.75rem; color: var(--text-light); text-transform: uppercase; font-weight: 700; }
        .opt-date { font-size: 1rem; font-weight: 700; color: var(--text); }
        .opt-avail { font-size: 0.85rem; font-weight: 700; padding: 0.25rem; border-radius: 4px; }
        .opt-avail.good { color: var(--success); background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.2); }
        .opt-avail.warn { color: var(--warning); background: rgba(245, 158, 11, 0.1); border: 1px solid rgba(245, 158, 11, 0.2); }
        .opt-avail.bad { color: var(--error); background: var(--error-bg); border: 1px solid rgba(239, 68, 68, 0.2); }

        .form-row { display: flex; flex-wrap: wrap; gap: 1rem; margin-bottom: 1rem; align-items: flex-end; }
        .input-group { display: flex; flex-direction: column; gap: 0.4rem; flex: 1; min-width: 140px; }
        label { font-size: 0.85rem; font-weight: 600; color: var(--text-light); margin-left: 0.25rem; }
        input, select { padding: 0.75rem 1rem; border: 1px solid var(--border); border-radius: 8px; font-size: 1rem; background-color: var(--input-bg); color: var(--text); outline: none; font-family: inherit; transition: border-color 0.2s; }
        input:focus, select:focus { background-color: var(--input-focus); border-color: var(--primary); }
        input[readonly] { cursor: pointer; }
        input[type="checkbox"] { width: auto; margin-right: 0.5rem; cursor: pointer; transform: scale(1.1); }

        input[type="date"] { position: relative; color: transparent !important; }
        input[type="date"]::before { content: attr(data-date); position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text); pointer-events: none; }
        [data-theme="dark"] input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.8); cursor: pointer; }

        button { background-color: var(--primary); color: white; padding: 0.75rem 1.5rem; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: transform 0.1s ease, background-color 0.2s; }
        button:hover:not(:disabled) { background-color: var(--primary-hover); transform: scale(0.98); }
        button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        
        .btn-secondary { background-color: var(--input-bg); color: var(--text); border: 1px solid var(--border); }
        .btn-secondary:hover:not(:disabled) { background-color: var(--highlight); border-color: var(--primary); color: var(--primary); }
        .btn-text { background: none; border: none; color: var(--text-light); padding: 0; font-size: 0.875rem; text-decoration: underline; }
        .btn-text:hover { color: var(--text); background: none; transform: none; }
        
        .preset-chip { background: var(--input-bg); color: var(--text); padding: 0.4rem 1rem; border-radius: 99px; font-size: 0.875rem; cursor: pointer; border: 1px solid var(--border); }
        .preset-chip:hover { border-color: var(--primary); background: var(--highlight); color: var(--primary); }

        .table-responsive { overflow-x: auto; margin-top: 1rem; border-radius: 8px; border: 1px solid var(--border); background: var(--card-bg); }
        table { width: 100%; border-collapse: collapse; font-size: 0.95rem; white-space: nowrap; }
        th, td { padding: 1rem; text-align: left; border-bottom: 1px solid var(--border); vertical-align: middle; }
        th { font-weight: 600; color: var(--text-light); background: var(--border-light); position: sticky; top: 0; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.05em; z-index: 10; }
        
        .main-row { cursor: pointer; transition: background-color 0.1s; }
        .main-row:hover { background-color: var(--input-bg); }
        .details-row { background-color: var(--border-light); font-size: 0.85rem; }
        .details-content { padding: 1.25rem; border-left: 4px solid var(--primary); }
        .btn-action { background: transparent; border: none; padding: 0.25rem 0.5rem; font-size: 0.85rem; border-radius: 6px; color: var(--text-light); opacity: 0.5; transition: all 0.2s ease; }
        .btn-action:hover { opacity: 1; background: var(--border-light); color: var(--text); }
        .btn-delete:hover { color: var(--error); background: var(--error-bg); }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); display: flex; align-items: center; justify-content: center; z-index: 1500; opacity: 0; pointer-events: none; transition: opacity 0.2s ease; backdrop-filter: blur(2px); }
        .modal-overlay.show { opacity: 1; pointer-events: auto; }
        .modal-overlay .card { width: 100%; max-width: 600px; max-height: 90vh; overflow-y: auto; margin: 0 1rem; transform: scale(0.95) translateY(20px); transition: transform 0.2s cubic-bezier(0.2, 0.8, 0.2, 1); border: 1px solid var(--border); }
        .modal-overlay.show .card { transform: scale(1) translateY(0); }
    </style>
</head>
<body>

    <div id="loginModal" class="modal-overlay show">
        <div class="card">
            <div id="viewLogin">
                <h1 style="margin-bottom: 0.5rem; text-align: center;">Suzuko<span style="color: var(--primary); font-weight: 300;">Tracker</span></h1>
                <p class="text-muted" style="margin-bottom: 1.5rem; text-align: center;">Secure Cloud Sync Enabled</p>
                
                <form id="emailLoginForm" style="display: flex; flex-direction: column; gap: 1rem; margin-bottom: 1rem; text-align: left;">
                    <div class="input-group">
                        <label>Email</label>
                        <input type="email" id="loginEmail" required placeholder="you@example.com">
                    </div>
                    <div class="input-group">
                        <div style="display: flex; justify-content: space-between;">
                            <label>Password</label>
                            <a href="#" id="linkForgotPassword" style="font-size: 0.75rem; color: var(--primary); text-decoration: none;">Forgot?</a>
                        </div>
                        <input type="password" id="loginPassword" required placeholder="••••••••">
                    </div>
                    <div style="display: flex; gap: 0.5rem; margin-top: 0.5rem;">
                        <button type="submit" id="btnEmailSignIn" style="flex: 1;">Sign In</button>
                        <button type="button" id="btnEmailSignUp" class="btn-secondary" style="flex: 1;">Register</button>
                    </div>
                </form>

                <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem;">
                    <div style="flex: 1; height: 1px; background: var(--border);"></div>
                    <span class="text-muted" style="font-size: 0.8rem;">OR</span>
                    <div style="flex: 1; height: 1px; background: var(--border);"></div>
                </div>

                <button id="btnGoogleLogin" style="width: 100%; margin-bottom: 1.5rem; display: flex; justify-content: center; align-items: center; gap: 0.5rem; background: var(--input-bg); color: var(--text); border: 1px solid var(--border);">
                    <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/><path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/><path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/><path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/></svg>
                    Sign in with Google
                </button>

                <button id="btnGuestLogin" class="btn-text" style="width: 100%; color: var(--text-light);">Continue as Guest (No Cloud Sync)</button>
                <div id="loginStatus" class="text-muted" style="margin-top: 1rem; font-size: 0.85rem; text-align: center;"></div>
            </div>

            <div id="viewReset" style="display: none; text-align: left;">
                <h2>Reset Password</h2>
                <div class="input-group" style="margin-bottom: 1.5rem;">
                    <label>Email Address</label>
                    <input type="email" id="resetEmail" placeholder="you@example.com">
                </div>
                <div style="display: flex; gap: 0.5rem;">
                    <button type="button" id="btnCancelReset" class="btn-secondary" style="flex: 1;">Back</button>
                    <button type="button" id="btnSendReset" style="flex: 2;">Send Link</button>
                </div>
                <div id="resetStatus" style="margin-top: 1rem;"></div>
            </div>

            <div id="viewVerify" style="display: none; text-align: center;">
                <h2 style="color: var(--warning);">Verify Email</h2>
                <p class="text-muted">Please check your inbox to verify your account.</p>
                <div style="display: flex; flex-direction: column; gap: 0.75rem;">
                    <button type="button" id="btnCheckVerified">I have verified</button>
                    <button type="button" id="btnResendVerify" class="btn-secondary">Resend Email</button>
                    <button type="button" id="btnCancelVerify" class="btn-text" style="color: var(--error);">Sign Out</button>
                </div>
            </div>
        </div>
    </div>

    <div class="header">
        <h1>Suzuko<span style="color: var(--primary); font-weight: 300;">Tracker</span></h1>
        <div class="user-nav">
            <span id="userDisplayName">...</span>
            <button id="btnSignOut" class="btn-text" style="font-size: 0.8rem; color: var(--error);">Sign Out</button>
            <button id="themeToggle" class="btn-secondary" style="padding: 0.4rem 0.8rem; font-size: 0.8rem;">☀️</button>
        </div>
    </div>

        const firebaseConfig = {

        const auth = firebase.auth();
        const db = firebase.firestore();

</body>
</html>
